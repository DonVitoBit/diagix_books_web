# Фрагмент для включения в блок http {} в /etc/nginx/nginx.conf
# Обязателен для работы WebSocket за прокси (Streamlit _stcore/stream).
# В /etc/nginx/nginx.conf внутри блока http { } добавьте ПЕРВОЙ строкой:
#   include /home/user1/med_book/deploy/nginx-http-upgrade.conf;
# Либо вставьте вручную:
#   map $http_upgrade $connection_upgrade { default upgrade; '' close; }
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
